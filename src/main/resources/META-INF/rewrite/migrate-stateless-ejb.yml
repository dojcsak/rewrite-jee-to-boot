type: specs.openrewrite.org/v1beta/recipe
name: hu.dojcsak.openrewrite.recipe.MigrateStatelessEjb
displayName: Migrate stateless EJB to Spring Boot
description: >-
  Migrates stateless EJB components to Spring Boot 2.7.x services.
  Replaces @EJB field/setter injection with @Autowired, adding @Qualifier when beanName is a string
  literal; flags lookup, beanInterface, name, mappedName, non-empty description, and non-literal
  beanName/lookup/mappedName with a TODO comment instead of migrating automatically; skips
  constructor-level @EJB (EJB does not support constructor injection).
  Replaces @Stateless/@Singleton with @Service (preserving the name string-literal attribute);
  removes @Local, @LocalBean, and @Startup from bean classes and interfaces; flags mappedName,
  description, non-literal name, and @Startup removal with a search result comment; skips beans
  that implement a @Remote interface (directly, through a superclass, or via superinterface
  inheritance) and marks them for manual migration.
  Replaces javax.inject.@Inject with @Autowired.
  Adds @Transactional to @Service classes as a replacement for Container-Managed Transactions (CMT).
  Removes <packaging>ejb</packaging> from module POMs and <type>ejb</type> from dependency references.
  Removes EJB build dependencies (javaee-api, javax.ejb-api, jboss-ejb-api, weblogic javaee-api).
  Adds spring-boot-starter for all EJB modules, spring-tx (without an explicit version) for non-JPA
  modules, and spring-boot-starter-data-jpa for modules that use javax.persistence.*.
tags:
  - jee
  - ejb
  - spring-boot
recipeList:
  # 1. Replace @EJB field/setter injection with @Autowired (+@Qualifier if beanName is a string literal;
  #    non-migratable attributes flagged with TODO; constructor @EJB skipped)
  - hu.dojcsak.openrewrite.recipe.jee.ejb.MigrateEjbAnnotations

  # 2. Replace @Stateless/@Singleton with @Service; remove @Local/@LocalBean/@Startup from classes and
  #    interfaces; flag mappedName/description/@Startup/non-literal name; skip @Remote beans
  - hu.dojcsak.openrewrite.recipe.jee.ejb.MigrateStatelessSessionBeans

  # 3. Replace javax.inject.@Inject with @Autowired
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: javax.inject.Inject
      newFullyQualifiedTypeName: org.springframework.beans.factory.annotation.Autowired

  # 4. Add @Transactional to @Service classes as replacement for EJB CMT
  - hu.dojcsak.openrewrite.recipe.jee.ejb.AddTransactionalToServiceBeans

  # 5. Remove EJB Maven packaging configuration
  - hu.dojcsak.openrewrite.recipe.jee.ejb.RemoveEjbMavenPackaging

  # 6. Remove EJB build dependencies
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: javax
      artifactId: javaee-api
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: javax.ejb
      artifactId: javax.ejb-api
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.jboss.spec.javax.ejb
      artifactId: "jboss-ejb-api_3*"
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: com.oracle.weblogic
      artifactId: javax.javaee-api

  # 7. Add Spring Boot 2.7.x core starter (only if javax.ejb.* is used)
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: org.springframework.boot
      artifactId: spring-boot-starter
      version: 2.7.18
      onlyIfUsing: "javax.ejb.*"

  # 8. Add spring-tx for EJB session bean modules without JPA
  # (spring-boot-starter-data-jpa already includes spring-tx transitively; decision is per module)
  - hu.dojcsak.openrewrite.recipe.jee.ejb.AddSpringTxUnlessJpaPresent

  # 9. Add Spring Boot JPA starter (only when javax.persistence.* types are used)
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: org.springframework.boot
      artifactId: spring-boot-starter-data-jpa
      version: 2.7.18
      onlyIfUsing: "javax.persistence.*"
